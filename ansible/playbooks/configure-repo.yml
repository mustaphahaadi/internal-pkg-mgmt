---
# -------------------------------------------------------
# configure-repo.yml
# Configures the yum_local repo on ALL client containers
# Run: make ansible-configure
# -------------------------------------------------------

- name: Configure local YUM repository on all clients
  hosts: clients

  vars:
    repo_name: "{{ lookup('env', 'REPO_NAME') | default('yum_local') }}"
    repo_url: "http://repo-server/repos/{{ repo_name }}/"

  tasks:

    - name: Disable all default repos
      shell: docker exec {{ inventory_hostname }} dnf config-manager --disable "*"
      ignore_errors: yes

    - name: Create yum_local repo config file
      shell: |
        docker exec {{ inventory_hostname }} bash -c 'cat > /etc/yum.repos.d/yum_local.repo << EOF
        [{{ repo_name }}]
        name={{ repo_name }}
        baseurl={{ repo_url }}
        enabled=1
        gpgcheck=0
        EOF'

    - name: Verify repo is recognized by DNF
      shell: "docker exec {{ inventory_hostname }} dnf repolist"
      register: repolist_output

    - name: Show repolist output
      debug:
        var: repolist_output.stdout_lines
