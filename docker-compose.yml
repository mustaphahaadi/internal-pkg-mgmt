version: "3.8"

# =============================================================
# Internal Package Management System — Phase 2
# Added: ansible-controller, healthchecks, .env support
# =============================================================

networks:
  pkgnet:
    driver: bridge

services:

  repo-server:
    build:
      context: ./repo-server
    container_name: repo-server
    hostname: repo-server
    networks:
      - pkgnet
    volumes:
      - ./packages/downloaded_rpms:${PACKAGE_SOURCE}
      - ./scripts:/scripts
    ports:
      - "${REPO_SERVER_PORT}:80"
    # Health check — clients wait for this before starting
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web-server:
    build:
      context: ./clients
    container_name: web-server
    hostname: web-server
    networks:
      - pkgnet
    depends_on:
      repo-server:
        condition: service_healthy      # waits until repo is truly ready
    environment:
      - REPO_URL=http://repo-server/repos/${REPO_NAME}/

  db-server:
    build:
      context: ./clients
    container_name: db-server
    hostname: db-server
    networks:
      - pkgnet
    depends_on:
      repo-server:
        condition: service_healthy
    environment:
      - REPO_URL=http://repo-server/repos/${REPO_NAME}/

  backup-server:
    build:
      context: ./clients
    container_name: backup-server
    hostname: backup-server
    networks:
      - pkgnet
    depends_on:
      repo-server:
        condition: service_healthy
    environment:
      - REPO_URL=http://repo-server/repos/${REPO_NAME}/

  # -------------------------------------------------------
  # ANSIBLE CONTROLLER — NEW IN PHASE 2
  # Runs Ansible playbooks against all client containers
  # -------------------------------------------------------
  ansible-controller:
    build:
      context: ./ansible
    container_name: ansible-controller
    hostname: ansible-controller
    networks:
      - pkgnet
    depends_on:
      repo-server:
        condition: service_healthy
    volumes:
      - ./ansible:/ansible         # mount playbooks live
    environment:
      - REPO_NAME=${REPO_NAME}
    # Keep running so we can exec into it
    command: tail -f /dev/null
