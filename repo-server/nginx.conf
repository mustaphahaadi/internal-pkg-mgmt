# nginx.conf — serves the yum repo directory over HTTP

events {}

http {
    server {
        listen 80;
        server_name repo-server;

        # Serve the repo directory with file listing enabled
        location /repos/ {
            root /usr/share/nginx/html;
            autoindex on;          # lets you browse packages in browser
            autoindex_exact_size off;
            autoindex_localtime on;
        }

        # Health check endpoint
        location /health {
            return 200 "repo-server is up\n";
        }
    }
}
